databaseChangeLog:
  - changeSet:
      id: create-refresh-token
      author: Andrey Karpushin
      changes:
        - createTable:
            tableName: refresh_token
            columns:

              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true

              - column:
                  name: created_at
                  type: timestamp

              - column:
                  name: updated_at
                  type: timestamp

              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false

              - column:
                  name: token
                  type: text
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: revoked
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

              - column:
                  name: expires_at
                  type: timestamp
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: refresh_token
            baseColumnNames: user_id
            referencedTableName: user
            referencedColumnNames: id
            constraintName: fk_refresh_token_user
