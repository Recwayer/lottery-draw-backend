databaseChangeLog:
  - changeSet:
      id: add-lottery-type-id-to-draw
      author: Andrey Karpushin
      changes:
        - addColumn:
            tableName: draw
            columns:
              - column:
                  name: lottery_type_id
                  type: uuid

        - update:
            tableName: draw
            columns:
              - column:
                  name: lottery_type_id
                  value: 00000000-0000-0000-0000-00000000c649
            where: lottery_type_id IS NULL

        - addNotNullConstraint:
            tableName: draw
            columnName: lottery_type_id
            columnDataType: uuid

        - addForeignKeyConstraint:
            baseTableName: draw
            baseColumnNames: lottery_type_id
            referencedTableName: lottery_type
            referencedColumnNames: id
            constraintName: fk_draw_lottery_type
