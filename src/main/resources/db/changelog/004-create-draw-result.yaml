databaseChangeLog:
  - changeSet:
      id: create-draw-result
      author: Andrey Karpushin
      changes:
        - createTable:
            tableName: draw_result
            columns:

              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true

              - column:
                  name: created_at
                  type: timestamp

              - column:
                  name: updated_at
                  type: timestamp

              - column:
                  name: draw_id
                  type: uuid
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: winning_numbers
                  type: varchar(255)

        - addForeignKeyConstraint:
            baseTableName: draw_result
            baseColumnNames: draw_id
            referencedTableName: draw
            referencedColumnNames: id
            constraintName: fk_draw_result_draw
