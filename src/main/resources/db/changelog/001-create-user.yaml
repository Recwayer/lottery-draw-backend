databaseChangeLog:
  - changeSet:
      id: create-users
      author: Andrey Karpushin
      changes:
        - createTable:
            tableName: user
            columns:

              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true

              - column:
                  name: created_at
                  type: timestamp

              - column:
                  name: updated_at
                  type: timestamp

              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: password_hash
                  type: varchar(255)
                  constraints:
                    nullable: false

              - column:
                  name: role
                  type: varchar(31)
                  constraints:
                    nullable: false