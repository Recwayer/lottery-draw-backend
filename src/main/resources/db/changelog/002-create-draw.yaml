databaseChangeLog:
  - changeSet:
      id: create-draw
      author: Andrey Karpushin
      changes:
        - createTable:
            tableName: draw
            columns:

              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true

              - column:
                  name: created_at
                  type: timestamp

              - column:
                  name: updated_at
                  type: timestamp

              - column:
                  name: name
                  type: varchar(255)

              - column:
                  name: status
                  type: varchar(31)

              - column:
                  name: draw_date
                  type: timestamp