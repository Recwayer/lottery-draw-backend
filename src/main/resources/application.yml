micronaut:
  application:
    name: lottery-draw-backend
  server:
    port: ${PORT:8080}
  security:
    authentication: bearer
    token:
      authentication: bearer
      jwt:
        signatures:
          secret:
            generator:
              secret: "${JWT_SECRET:pleaseChangeThisSecretForProductionUseOnly}"
              jws-algorithm: HS256
        generator:
          access-token:
            expiration: ${JWT_ACCESS_TTL_SECONDS:900}
          refresh-token:
            secret: "${JWT_REFRESH_SECRET:pleaseChangeThisRefreshSecretForProd}"

jwt:
  refresh-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:604800}

datasources:
  default:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    dialect: POSTGRES
    schema-generate: NONE
    maximum-pool-size: ${DB_POOL_SIZE:10}
    minimum-idle: ${DB_POOL_MIN_IDLE:2}
    idle-timeout: ${DB_POOL_IDLE_TIMEOUT:30000}
    connection-timeout: ${DB_CONNECTION_TIMEOUT:10000}
    schema: ${DB_DEFAULT_SCHEMA:public}

liquibase:
  datasources:
    default:
      change-log: classpath:db/changelog-master.yaml
      liquibase-schema: ${DB_MIGRATION_SCHEMA:migration}
      default-schema: ${DB_DEFAULT_SCHEMA:public}
