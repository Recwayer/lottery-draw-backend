databaseChangeLog:
  - changeSet:
      id: create-ticket
      author: Andrey Karpushin
      changes:
        - createTable:
            tableName: ticket
            columns:

              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true

              - column:
                  name: created_at
                  type: timestamp

              - column:
                  name: updated_at
                  type: timestamp

              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false

              - column:
                  name: draw_id
                  type: uuid
                  constraints:
                    nullable: false

              - column:
                  name: numbers
                  type: varchar(255)

              - column:
                  name: status
                  type: varchar(31)

        - addForeignKeyConstraint:
            baseTableName: ticket
            baseColumnNames: user_id
            referencedTableName: user
            referencedColumnNames: id
            constraintName: fk_ticket_user

        - addForeignKeyConstraint:
            baseTableName: ticket
            baseColumnNames: draw_id
            referencedTableName: draw
            referencedColumnNames: id
            constraintName: fk_ticket_draw