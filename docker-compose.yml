version: "3.9"
services:
  postgresql:
    image: postgres:17
    container_name: lottery_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lottery
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d lottery" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
    container_name: lottery_backend
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgresql:5432/lottery
      DB_USER: admin
      DB_PASSWORD: password
      DB_POOL_SIZE: 10
      DB_POOL_MIN_IDLE: 2

      LIQUIBASE_TARGET_SCHEMA: public
      LIQUIBASE_MIGRATION_SCHEMA: migration

      HIBERNATE_SHOW_SQL: true
      HIBERNATE_FORMAT_SQL: true
      HIBERNATE_DDL_AUTO_STRATEGY: validate
      HIBERNATE_DEFAULT_SCHEMA: public
    ports:
      - "8080:8080"
    depends_on:
      postgresql:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local