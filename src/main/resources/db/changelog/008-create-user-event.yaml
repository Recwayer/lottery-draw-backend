databaseChangeLog:
  - changeSet:
      id: create-user-event
      author: Andrey Karpushin
      changes:
        - createTable:
            tableName: user_event
            columns:

              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true

              - column:
                  name: created_at
                  type: timestamp

              - column:
                  name: updated_at
                  type: timestamp

              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false

              - column:
                  name: type
                  type: varchar(31)
                  constraints:
                    nullable: false

              - column:
                  name: payload
                  type: text

        - addForeignKeyConstraint:
            baseTableName: user_event
            baseColumnNames: user_id
            referencedTableName: user
            referencedColumnNames: id
            constraintName: fk_user_event_user

        - createIndex:
            tableName: user_event
            indexName: idx_user_event_user_created
            columns:
              - column:
                  name: user_id
              - column:
                  name: created_at
                  descending: true
